name: cmbcore-ci

# WP3 validation CI (04_task_plan_and_review.md §1, §3).
# Runs the unit tests (§5.1-5.2). The CLASS reference comparison (§5.3) runs in
# cached-CSV mode when `classy` is unavailable.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib pytest nbformat
      - name: Unit tests (numerics spec §5.1-5.2)
        run: python -m pytest -q
      - name: Generate values.json (WP3 schema)
        run: python scripts/make_values.py 120
      - name: Upload values.json
        uses: actions/upload-artifact@v4
        with:
          name: values
          path: figures/values.json
